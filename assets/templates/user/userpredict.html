{% extends 'user/userbase.html' %}
{% load static %}

{% block title %}Scanning — CurrencySense{% endblock %}

{% block contents %}
<div class="scanning" role="status" aria-live="polite" aria-label="Scanning currency note">
    <div class="scan-spinner"></div>
    <h2 class="t-title">Analyzing Currency</h2>
    <p class="t-body-sm" style="max-width:360px;margin-top:12px">
        Hold the note steady. Processing multiple frames for accurate detection…
    </p>
    <div class="scan-dots" aria-hidden="true">
        <div class="scan-dot"></div>
        <div class="scan-dot"></div>
        <div class="scan-dot"></div>
    </div>
</div>
{% endblock %}
