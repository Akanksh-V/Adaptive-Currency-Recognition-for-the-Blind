{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Currency Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            color: #0F172A;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            padding: 4rem 3rem;
            text-align: center;
            background-color: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.05);
        }

        h1 {
            font-weight: 700;
            font-size: 3.5rem;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
            color: #0F172A;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #64748B;
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        .action-button {
            display: block;
            width: 100%;
            background-color: #0F172A;
            color: #FFFFFF;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 1.5rem;
            border-radius: 16px;
            text-decoration: none;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 14px rgba(15,23,42,0.15);
            border: none;
            cursor: pointer;
        }

        .action-button:hover {
            transform: scale(1.02) translateY(-2px);
            background-color: #334155;
            color: #FFFFFF;
        }

        .result-box {
            background-color: #F0FDF4;
            border: 2px solid #4ADE80;
            color: #166534;
            padding: 2rem;
            border-radius: 16px;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            display: block;
        }

        .error-box {
            background-color: #FEF2F2;
            border: 2px solid #F87171;
            color: #991B1B;
            padding: 1.5rem;
            border-radius: 16px;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 3rem;
            display: block;
        }
    </style>
</head>
<body>
    {% block contents %}{% endblock %}
</body>
</html>
