{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CurrencySense — AI-powered adaptive currency recognition for the visually impaired.">
    <title>{% block title %}CurrencySense{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <nav class="nav" id="mainNav" role="navigation" aria-label="Main navigation">
        <div class="nav-inner">
            <a class="nav-brand" href="{% url 'home' %}">
                <span class="nav-brand-icon">₹</span>
                CurrencySense
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li><a class="nav-link" href="{% url 'userlogin' %}">User</a></li>
                <li><a class="nav-link" href="{% url 'adminlogin' %}">Admin</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
            </button>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay"></div>
    <div class="nav-spacer"></div>

    <main id="main-content">
        {% block contents %}{% endblock %}
    </main>

    <footer class="footer">
        CurrencySense · Accessible currency recognition
    </footer>

    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script>
        const nav = document.getElementById('mainNav');
        window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 10), { passive: true });
        const toggle = document.getElementById('navToggle');
        const links = document.getElementById('navLinks');
        const overlay = document.getElementById('navOverlay');
        toggle.addEventListener('click', () => {
            const open = links.classList.toggle('open');
            overlay.classList.toggle('open');
            toggle.setAttribute('aria-expanded', open);
        });
        overlay.addEventListener('click', () => {
            links.classList.remove('open');
            overlay.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        });
    </script>
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
        }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
